name: Scrape, Build and Deploy

on:
  schedule:
    # --- TEMPORADA ALTA (febrero a mayo / agosto a noviembre) ---
    # Lunes a viernes a las 17:00 y 23:00 (aprox. 15:00 y 21:00 UTC)
    - cron: '0 15,21 * 2,3,4,5,8,9,10,11 1-5'
    
    # Sábados y domingos: intenso (11:00, 13:00, 15:00, 17:00, 19:00, 21:00 y 23:00 hora local)
    # En UTC sería aprox.: 9, 11, 13, 15, 17, 19, 21
    - cron: '0 9,11,13,15,17,19,21 * 2,3,4,5,8,9,10,11 0,6'

    # --- PERÍODOS DE DESCANSO (dic, ene, jun, jul) ---
    # Una vez al día a las 23:00 (21:00 UTC) para asegurar la caché de la carpeta docs
    - cron: '0 21 * 1,6,7,12 *'

  workflow_dispatch: # Permite ejecución manual desde la web de GitHub

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Instalar dependencias del sistema (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libfontconfig1-dev libharfbuzz-dev libfribidi-dev

      - name: Caché de paquetes de R
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-pacman-${{ hashFiles('scrape.R', 'buildhtml.R') }}
          restore-keys: ${{ runner.os }}-r-pacman-

      # --- PERSISTENCIA DE LA CARPETA DOCS (Incremental) ---
      - name: Recuperar/Guardar carpeta docs
        uses: actions/cache@v4
        with:
          path: docs/
          # El run_id asegura que siempre se intente guardar una versión nueva al terminar
          key: docs-build-${{ github.run_id }}
          # El restore-keys busca la versión más reciente disponible que empiece por ese prefijo
          restore-keys: |
            docs-build-

      - name: Ejecutar Scraper
        run: Rscript scrape.R

      - name: Commit y Push de archivos de tracking (.rds)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add *.rds
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Actualización de estado de partidos (.rds)" && git push)

      - name: Generar HTML estático
        run: Rscript buildhtml.R

      - name: Desplegar a Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: mfudbalmk