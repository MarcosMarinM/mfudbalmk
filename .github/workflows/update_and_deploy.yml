name: Scrape, build and deploy

on:
  schedule:
    # --- TEMPORADA ALTA (febrero a mayo / agosto a noviembre) ---
    # Lunes a viernes a las 17:00 y 23:00 (aprox. 15:00 y 21:00 UTC)
    - cron: '0 15,21 * 2,3,4,5,8,9,10,11 1-5'
    
    # Sábados y domingos: intenso (11:00, 13:00, 15:00, 17:00, 19:00, 21:00 y 23:00 hora local)
    # En UTC sería aprox.: 9, 11, 13, 15, 17, 19, 21
    - cron: '0 9,11,13,15,17,19,21 * 2,3,4,5,8,9,10,11 0,6'

    # --- PERÍODOS DE DESCANSO (dic, ene, jun, jul) ---
    # Una vez al día a las 23:00 (21:00 UTC) para asegurar la caché de la carpeta docs
    - cron: '0 21 * 1,6,7,12 *'

  workflow_dispatch: # Permite ejecución manual desde la web de GitHub

concurrency:
  group: scraper-unico
  cancel-in-progress: false
  
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libfontconfig1-dev libharfbuzz-dev libfribidi-dev

      - name: R packages cache
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-pacman-${{ hashFiles('scrape.R', 'buildhtml.R') }}
          restore-keys: ${{ runner.os }}-r-pacman-

      - name: Scrape
        run: Rscript scrape.R

      - name: Commit and push .rds
        if: always() # Se ejecuta SIEMPRE para no perder el auto-guardado si R falla a medias
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Añadir todos los archivos .rds explícitamente (el pathspec de Git busca en todas las carpetas)
          git add \*.rds
          
          # Comprobar si hay cambios reales en los archivos .rds
          if ! git diff --staged --quiet; then
            echo "Nuevos datos detectados. Preparando commit..."
            git commit -m "Auto-update: Nuevos datos scrapeados"
            
            # EL ANTÍDOTO: Traer cualquier cambio externo (colisiones, re-runs, edits)
            git pull --rebase origin main
            
            # Subir todo con seguridad
            git push
          else
            echo "No hubo cambios en los datos durante esta sesión."
          fi

      - name: Build HTML
        run: Rscript buildhtml.R

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: mfudbalmk
